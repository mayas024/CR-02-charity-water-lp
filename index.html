<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>charity: water Landing Page</title>

    <!-- Connect to the CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header -->
    <header>
        <img src="img/cw_logo-2.png" alt="charity: water logo" class="logo">
    </header>

    <!-- Main Landing Page -->
    <main class="hero">

        <!-- Left Side -->
        <section class="hero-text">

            <h1>
                Donate $10. Provide three
                people with a year's worth
                of clean water.
            </h1>

            <p>
                Safe drinking water saves lives. Even $10 can go a long way to
                empower people in need. Donating takes under a minute, and
                100% of your donation goes toward funding clean water
                projects worldwide.
            </p>

            <button class="cta-button">
                <span class="button-text">
                    GIVE CLEAN WATER<br>TODAY
                </span>
                <img src="img/water-can-transparent.png" alt="water drop" class="button-icon">
            </button>

        </section>

        <!-- Right Side -->
        <section class="hero-image">

            <!-- Replace this with the real image later -->
            <img src="img/Rwanda-2018-march-cw-cubbygraham-1088.jpg"
                 alt="Family collecting clean water in Rwanda">

        </section>

    </main>

</body>
</html>
